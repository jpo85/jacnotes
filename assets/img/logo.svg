<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120">
  <rect width="100%" height="100%" rx="12" fill="#ffffff"/>

  <!-- prompt -->
  <text x="40" y="70"
        font-family="JetBrains Mono, Fira Code, monospace"
        font-size="42"
        fill="#0969da"
        font-weight="600">
    $
  </text>

  <!-- blog name -->
  <text x="80" y="70"
        font-family="JetBrains Mono, Fira Code, monospace"
        font-size="42"
        fill="#24292f">
    jac@notes
  </text>

  <!-- cursor -->
  <rect x="330" y="40" width="10" height="36" fill="#2da44e">
    <animate attributeName="opacity"
             values="1;0;1"
             dur="1.2s"
             repeatCount="indefinite"/>
  </rect>

  <!-- subtitle -->
  <text x="82" y="95"
        font-family="JetBrains Mono, Fira Code, monospace"
        font-size="16"
        fill="#57606a">
    sysadmin • devops • notes
  </text>
</svg>